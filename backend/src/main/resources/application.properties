# =========================
# APP
# =========================
spring.application.name=backend
server.port=2500
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# =========================
# DATABASE (SUPABASE / POSTGRESQL)
# =========================
spring.datasource.url=jdbc:${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =========================
# UPLOAD
# =========================
file.upload.dir=uploads/anexos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB

# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.back.backend=DEBUG
logging.level.org.springframework.security=INFO

# =========================
# JWT
# =========================
# ⚠️ Use uma chave de no mínimo 256 bits (32+ chars)
jwt.secret=protocolo-me-dev-secret-key-2026-minimo-32-bytes-segura
jwt.expiration=36000000
jwt.issuer=backend-api

# =========================
# CORS
# =========================
app.cors.allowed-origins=https://potential-robot-jj575ggvw974hxrx-3000.app.github.dev
app.cors.debug=false



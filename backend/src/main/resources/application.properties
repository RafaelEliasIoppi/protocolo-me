# =========================
# APP
# =========================
spring.application.name=backend
server.port=2500

# =========================
# DATABASE (H2 - DEV)
# =========================
spring.datasource.url=jdbc:h2:file:./data/banco;AUTO_SERVER=TRUE;LOCK_TIMEOUT=10000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# H2 Console (DEV ONLY)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================
# UPLOAD
# =========================
file.upload.dir=uploads/anexos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB

# =========================
# LOGGING
# =========================
logging.level.root=INFO
logging.level.back.backend=DEBUG
logging.level.org.springframework.security=INFO

# =========================
# JWT
# =========================
# ⚠️ Use uma chave de no mínimo 256 bits (32+ chars)
jwt.secret=protocolo-me-dev-secret-key-2026-minimo-32-bytes-segura
jwt.expiration=36000000
jwt.issuer=backend-api

# =========================
# CORS
# =========================
app.cors.allowed-origins=http://localhost:3000,https://*.github.dev


spring.application.name=backend
server.port=2500
spring.datasource.url=jdbc:h2:file:./data/banco;AUTO_SERVER=TRUE;LOCK_TIMEOUT=10000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT - chave estavel para nao invalidar tokens a cada reinicio
jwt.secret=protocolo-me-jwt-chave-secreta-longa-pelo-menos-256-bits-de-seguranca



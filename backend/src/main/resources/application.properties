spring.application.name=backend
server.port=2500
spring.datasource.url=jdbc:h2:file:./data/banco;AUTO_SERVER=TRUE;LOCK_TIMEOUT=10000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=protocolo_me_dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# H2 console habilitado apenas para ambiente de desenvolvimento
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Chave secreta JWT (minimo 256 bits). Em producao, defina via variavel de ambiente JWT_SECRET.
jwt.secret=${JWT_SECRET:protocolo-me-jwt-secret-chave-padrao-desenvolvimento-2024-seguro}



spring.application.name=backend
server.port=2500
spring.datasource.url=jdbc:h2:file:./data/banco;AUTO_SERVER=TRUE;LOCK_TIMEOUT=10000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuração de Upload de Arquivo
file.upload.dir=uploads/anexos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=30MB

# Logging
logging.level.root=INFO
logging.level.back.backend=DEBUG

# JWT
jwt.secret=protocolo-me-dev-secret-key-2026-minimo-32-bytes

# CORS
app.cors.allowed-origins=https://bug-free-fortnight-q7p49pgr9qxfxxx-3000.app.github.dev,http://127.0.0.1:3000



